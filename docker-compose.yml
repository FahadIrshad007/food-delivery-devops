version: '3.8'

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    environment:
      MONGO_URL: ${MONGO_URL:-mongodb://mongo:27017/foodapp}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret}
      SALT: ${SALT:-10}
      MONGO_URL: ${MONGO_URL:-mongodb://mongo:27017/foodapp}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret}
      SALT: ${SALT:-10}
      PORT: 4000
    ports:
      - "8081:4000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://backend:4000/"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: 
      context: ./frontend
      args:
        VITE_BACKEND_URL: http://13.63.130.174:8081
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

  admin:
    build: 
      context: ./admin
      args:
        VITE_BACKEND_URL: http://13.63.130.174:8081
    ports:
      - "8081:80"
      - "8081:80"
    depends_on:
      - backend

volumes:
  mongo_data: