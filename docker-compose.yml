version: '3.8'

services:
  backend:
    build: ./backend
    environment:
      MONGO_URL: ${MONGO_URL}
      JWT_SECRET: ${JWT_SECRET}
      SALT: ${SALT}
      PORT: 4000
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: 
      context: ./frontend
      args:
        VITE_BACKEND_URL: http://localhost:4000
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

  admin:
    build: 
      context: ./admin
      args:
        VITE_BACKEND_URL: http://localhost:4000
    ports:
      - "8081:80"
    depends_on:
      - backend
